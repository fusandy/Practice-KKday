<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKday</title>
    <!-- <link rel="stylesheet" href="./bootstrap-5.1.1-dist/css/bootstrap.css"> -->
    <link rel="stylesheet" href="./fontawesome/css/all.css">
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <div class="row">
                <div class="col">
                    <div class="logo">
                        <img src="https://cdn.kkday.com/pc-web/assets/img/kkday_logo_final.svg" alt="logo">
                    </div>
                    <ul class="header-nav">
                        <li><a href="#" class="header-nav-mobile"><i class="fas fa-mobile-alt"></i>下載 App 享優惠</a></li>
                        <li><a href="#">繁體中文 <i class="fas fa-chevron-down"></i></a></li>
                        <li><a href="#">TWD <i class="fas fa-chevron-down"></i></a></li>
                        <li><a href="#"><img class="cart" src="https://cdn.kkday.com/pc-web/assets/img/ic_profile_cart.svg" alt="shopping-cart"> </a></li>
                        <li><a href="#">登入 / 註冊</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <!-- Navbar -->
    <nav>
        <div class="container">
            <div class="row">
                <div class="col">
                    <div class="navbar-category">
                        <div class="ticket"><a href="#">熱門票券</a></div>
                        <div class="navbar-category-item outdoor-activity"><a href="#">戶外活動</a></div>
                        <div class="navbar-category-item experience"><a href="#">獨特體驗</a></div>
                        <div class="navbar-category-item tour-guide"><a href="#">城市導覽</a></div>
                        <div class="navbar-category-item day-tour"><a href="#">一日遊 & 多日遊</a></div>
                        <div class="navbar-category-item food"><a href="#">美食</a></div>
                        <div class="navbar-category-item traffic"><a href="#">交通</a></div>
                        <div class="navbar-category-item accomdation"><a href="#">住宿</a></div>
                        <div class="navbar-category-item sim-card"><a href="#">WiFi & SIM卡</a></div>
                        <div class="navbar-category-item gift"><a href="#">伴手禮</a></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Banner -->
    <div class="banner">
        <div class="cover">
            <div class="container">        
                <div class="search-area">
                    <div class="slogan">全世界最棒的旅遊體驗</div>
                    <div class="description">帶你深入探索有趣又獨特的旅遊體驗行程</div>
                    <div class="searchbar">
                        <div class="col-10">
                        <label for="search-bar" hidden></label>
                        <input type="text" class="form-control" id="search" placeholder="輸入目的地、景點、體驗行程或活動名稱...">
                        </div>
                        <div class="btn"><i class="fas fa-search"></i></div>
                    </div>
                </div>
            </div>
        </div>
    </div>















    
    <script src="./js/jquery-3.6.0.js"></script>
    <!-- <script src="./bootstrap-4.2.1-dist/js/bootstrap.bundle.js"></script> -->

    <script> 
    </script>
</body>
</html>
